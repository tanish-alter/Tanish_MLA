<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title th:text="${mode} + ' User'">User Form</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>
	<div class="container mt-4">
		<h2 th:text="${mode} + ' User'"></h2>

		<form th:action="@{/users/save}" th:object="${user}" method="post">
			<input type="hidden" th:field="*{id}" />

			<table class="table table-bordered">
				<tr>
					<th>Field</th>
					<th>Value</th>
				</tr>
				<tr>
					<td>Username</td>
					<td><input type="text" th:field="*{username}"
						class="form-control" /> <small
						th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
						class="text-danger"></small></td>
				</tr>
				<tr>
					<td>Password</td>
					<td><input type="password" th:field="*{password}"
						class="form-control" /> <small
						th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
						class="text-danger"></small></td>
				</tr>
				<tr>
					<td>Enabled</td>
					<td><input type="checkbox" th:field="*{enabled}" /></td>
				</tr>
				<tr>
					<td>Roles</td>
					<td>
						<!-- Simple checkboxes - NO th:field, NO complex SpEL --> <span
						th:each="role : ${allRoles}" style="margin-right: 15px;"> <input
							type="checkbox" name="roles" th:value="${role.id}"
							class="form-check-input" /> <label th:text="${role.name}"></label>
					</span>
					</td>
				</tr>

			</table>
			<button type="submit" class="btn btn-primary">Save</button>
			<a th:href="@{/users/list}" class="btn btn-secondary">Cancel</a>
		</form>
	</div>
</body>
</html>
