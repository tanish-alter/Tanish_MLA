<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Users <a th:align = "left" th:href="@{/users/new}" class="btn btn-primary">+ New</a>
    	<a th:align = "right" th:href="@{/login}" class="btn btn-primary">Sign In</a>
    </h2>
    
    <table class="table table-striped" th:if="${users != null and !users.isEmpty()}">
        <thead>
            <tr><th>ID</th><th>Username</th><th>Enabled</th><th>Roles</th><th>Actions</th></tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td>
                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                    <span th:unless="${user.enabled}" class="badge bg-secondary">Inactive</span>
                </td>
                <td>
                    <span th:each="role : ${user.roles}" 
                          th:text="${role.name}" 
                          class="badge bg-info me-1"></span>
                </td>
                <td>
                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <a th:href="@{/users/delete/{id}(id=${user.id})}" 
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
    <div th:if="${users == null or users.isEmpty()}" class="alert alert-info">No users found</div>
</div>
</body>
</html>
